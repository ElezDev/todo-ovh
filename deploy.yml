name: Deploy Todo App → OVHcloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Instalar dependencias y compilar
      - name: Instalar dependencias
        run: npm install

      - name: Build producción
        run: npm run build
        # Genera la carpeta /dist con los archivos estáticos

      # 4. Subir /dist al VPS por SSH usando rsync
      - name: Deploy al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/"
          target: "/var/www/todo-app"
          strip_components: 1